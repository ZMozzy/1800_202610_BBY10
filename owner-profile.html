  <script>
    const searchToggleBtn = document.getElementById("searchToggleBtn");
    const navbarSearch = document.getElementById("navbarSearch");

    if (searchToggleBtn && navbarSearch && window.bootstrap) {
      const searchCollapse = bootstrap.Collapse.getOrCreateInstance(
        navbarSearch,
        {
          toggle: false,
        },
      );

      searchToggleBtn.addEventListener("click", function (event) {
        event.preventDefault();
        searchCollapse.toggle();
      });

      navbarSearch.addEventListener("shown.bs.collapse", function () {
        searchToggleBtn.setAttribute("aria-expanded", "true");
      });

      navbarSearch.addEventListener("hidden.bs.collapse", function () {
        searchToggleBtn.setAttribute("aria-expanded", "false");
      });
    }
  </script>

  <script>
    function updateWaitTime() {
      let newTime = prompt("Enter new wait time:");
      //only update if they didnt hit cancel or enter nothing
      if (newTime !== null && newTime.trim() !== "") {
        let numericValue = Number(newTime);

        // Check if it is a valid integer and not a negative number
        if (Number.isInteger(numericValue) && numericValue >= 0) {
          let finalWait = numericValue + " min";

          document.getElementById("wait-time-value").innerText = finalWait;
        }
      }
    }
  </script>

  <script type="module" src="./src/main.js"></script>
