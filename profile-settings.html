<!DOCTYPE html>
<html lang="en">

<head>


  <title>My BCIT Project</title>
  <meta name="comp1800 template" content="My 1800 App">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./styles/style.css">

  <style>
    .page {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #fefae0;
      color: #333;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .settings-card {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
      font-size: 1.5rem;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #007bff;
    }

    .btn-save {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      width: 100%;
    }

    .btn-save:hover {
      background-color: #0056b3;
    }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin: 30px 0 15px;
    }

    .helper-text {
      font-size: 0.8rem;
      color: #666;
      margin-top: 5px;
    }

    .btn-logout {
      margin-block: 1rem;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      width: 100%;
    }

    .btn-logout:hover {
      background-color: #0056b3;
    }
  </style>
</head>


<body>
  <!-- start nav -->
  <nav class="navbar navbar-light topbar-custom">
    <div class="container-fluid">
      <button type="button" class="btn btn-outline-dark btn-sm" aria-label="Filter" title="Filter">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="7" y1="12" x2="17" y2="12"></line>
          <line x1="10" y1="18" x2="14" y2="18"></line>
        </svg>
      </button>

      <a class="navbar-brand mx-auto mb-0 topbar-brand" href="./index.html">
        FastPass
      </a>

      <div class="d-flex align-items-center">
        <button id="searchToggleBtn" class="btn btn-outline-dark btn-sm me-2" type="button" aria-expanded="false"
          aria-controls="navbarSearch" aria-label="Search" title="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
          </svg>
        </button>
      </div>
    </div>
  </nav>
  <div class="collapse topbar-search-wrap" id="navbarSearch">
    <div class="container-fluid py-2">
      <form class="d-flex" role="search">
        <input class="form-control" type="search" placeholder="Search" aria-label="Search" />
        <button class="btn btn-outline-success ms-2" type="submit">Go</button>
      </form>
    </div>
  </div>
  <!-- end nav -->


  <div class="page">
    <div class="settings-card">
      <h2>Account Settings</h2>

      <form id="update-profile-form">
        <div class="section-title">Public Profile</div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="new-username" name="username" placeholder="janesmith123">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="new-email" name="email" placeholder="jane@example.com">
        </div>

        <div class="section-title">Security</div>

        <div class="form-group">
          <label for="current-password">Current Password</label>
          <input type="password" id="current-password" name="current-password">
        </div>

        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="new-password">
          <p class="helper-text">Minimum 8 characters.</p>
        </div>

        <button type="submit" class="btn-save">Save Changes</button>
      </form>
      <button type="submit" class="btn-logout" id="logout">Logout</button>
    </div>
  </div>


  <!-- fixed bottom footer -->
  <nav class="navbar fixed-bottom custom-footer">
    <div class="container-fluid d-flex justify-content-around text-center">
      <!--- add restraint page --->
      <a href="./add.html" class="nav-link active">
        <img src="images/add.png" alt="Add" class="nav-icon">
      </a>
      <!--- home page --->

      <a href="./index.html" class="nav-link">
        <img src="images/home.png" alt="Home" class="home-icon">
      </a>
      <!---user profile page-->

      <a href="#" id="profile-link" class="nav-link">
        <img src="images/user.png" aria-label="Profile" class="profile-icon">
      </a>

    </div>
  </nav>


  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!---------------------------------------------->
  <!-- Your own JavaScript functions go here    -->
  <!---------------------------------------------->
  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!---------------------------------------------->
  <!-- Your own JavaScript functions go here    -->
  <!---------------------------------------------->

  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/profileSettings.js"></script>
  
  <script>
    const searchToggleBtn = document.getElementById("searchToggleBtn");
    const navbarSearch = document.getElementById("navbarSearch");

    if (searchToggleBtn && navbarSearch && window.bootstrap) {
      const searchCollapse = bootstrap.Collapse.getOrCreateInstance(navbarSearch, {
        toggle: false,
      });

      searchToggleBtn.addEventListener("click", function (event) {
        event.preventDefault();
        searchCollapse.toggle();
      });

      navbarSearch.addEventListener("shown.bs.collapse", function () {
        searchToggleBtn.setAttribute("aria-expanded", "true");
      });

      navbarSearch.addEventListener("hidden.bs.collapse", function () {
        searchToggleBtn.setAttribute("aria-expanded", "false");
      });
    }
  </script>

</body>

</html>
