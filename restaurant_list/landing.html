<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FastPass Landing</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Material Icons -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles/style.css" />
  </head>

  <body class="restaurant-page">
    <!-- NAVBAR -->
    <nav class="navbar navbar-light topbar-custom">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <!-- FILTER DROPDOWN -->
        <div class="dropdown">
          <button
            class="btn btn-light d-flex align-items-center"
            type="button"
            id="filterDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <span class="material-icons me-1">filter_list</span>
            Filter
          </button>
          <ul
            class="dropdown-menu p-3"
            aria-labelledby="filterDropdown"
            style="min-width: 250px"
          >
            <!-- Filter options will be injected here -->
          </ul>
        </div>

        <!-- BRAND -->
        <a class="navbar-brand mx-auto mb-0 topbar-brand" href="../index.html">
          <img
            src="../images/logoNoBG.png"
            alt="FastPass"
            class="topbar-logo"
          />
        </a>

        <!-- SEARCH BUTTON -->
        <button
          id="searchToggleBtn"
          class="btn btn-light d-flex align-items-center"
          type="button"
          aria-expanded="false"
          aria-controls="navbarSearch"
          aria-label="Search"
        >
          <span class="material-icons me-1">search</span>
          Search
        </button>
      </div>
    </nav>

    <!-- Search Bar -->
    <div class="collapse" id="navbarSearch">
      <div class="container-fluid py-2">
        <input
          id="restaurantSearch"
          class="form-control"
          type="text"
          placeholder="Search restaurants..."
        />
      </div>
    </div>

    <!-- RESTAURANT CARDS -->
    <main class="container my-5 d-flex flex-column align-items-center">
      <div id="restaurants-go-here" class="w-100"></div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./landing.js"></script>
    <script>
      const searchToggleBtn = document.getElementById("searchToggleBtn");
      const navbarSearch = document.getElementById("navbarSearch");
      if (searchToggleBtn && navbarSearch && window.bootstrap) {
        const searchCollapse = bootstrap.Collapse.getOrCreateInstance(
          navbarSearch,
          { toggle: false },
        );
        searchToggleBtn.addEventListener("click", (e) => {
          e.preventDefault();
          searchCollapse.toggle();
        });
      }
    </script>
    <script type="module" src="../src/goToProfile.js"></script>
    <script type="module" src="../src/search.js"></script>
    <script src="/src/footer.js"></script>
  </body>
</html>
