<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FastPass Landing</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles/style.css" />
  </head>

  <body class="restaurant-page">
    <!-- NAVBAR -->
    <nav class="navbar navbar-light topbar-custom">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <!-- FILTER DROPDOWN -->
        <div class="dropdown">
          <button
            class="btn btn-outline-dark btn-sm dropdown-toggle"
            type="button"
            id="filterDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            Filter
          </button>
          <ul
            class="dropdown-menu p-3"
            aria-labelledby="filterDropdown"
            style="min-width: 250px"
          >
            <!-- Cuisine Filter -->
            <div>
              <strong>Cuisine</strong>
              <div class="d-flex flex-wrap gap-1 mt-1">
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="cuisine"
                  data-value="fast food"
                >
                  Fast Food
                </button>
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="cuisine"
                  data-value="italian"
                >
                  Italian
                </button>
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="cuisine"
                  data-value="chinese"
                >
                  Chinese
                </button>
              </div>
            </div>

            <!-- Price/Wait Filter -->
            <div class="mt-2">
              <strong>Price</strong>
              <div class="d-flex flex-wrap gap-1 mt-1">
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="price"
                  data-value="$"
                >
                  $
                </button>
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="price"
                  data-value="$$"
                >
                  $$
                </button>
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="price"
                  data-value="$$$"
                >
                  $$$
                </button>
              </div>
            </div>

            <!-- Location Filter -->
            <div class="mt-2">
              <strong>Location</strong>
              <div class="d-flex flex-wrap gap-1 mt-1">
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="location"
                  data-value="submitted"
                >
                  Submitted
                </button>
                <button
                  class="btn btn-outline-dark btn-sm filter-btn"
                  data-filter="location"
                  data-value="approved"
                >
                  Approved
                </button>
              </div>
            </div>

            <!-- Clear Filters -->
            <div class="mt-3">
              <button
                id="clearFilterBtn"
                class="btn btn-outline-secondary btn-sm w-100"
              >
                Clear Filters
              </button>
            </div>
          </ul>
        </div>

        <!-- BRAND -->
        <a class="navbar-brand mx-auto mb-0 topbar-brand" href="../index.html"
          ><img
            src="../images/logoNoBG.png"
            alt="FastPass"
            class="topbar-logo"
        /></a
        >

        <!-- SEARCH BUTTON -->
        <button
          id="searchToggleBtn"
          class="btn btn-outline-dark btn-sm"
          type="button"
          aria-expanded="false"
          aria-controls="navbarSearch"
          aria-label="Search"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
          </svg>
        </button>
      </div>
    </nav>
    <!-- Search Bar -->
    <div class="collapse" id="navbarSearch">
      <div class="container-fluid py-2">
        <input
          id = "restaurantSearch"
          class="form-control"
          type="text"
          placeholder="Search restaurants..."
        />
      </div>
    </div>

    <!-- RESTAURANT CARDS -->
    <main class="container my-5 d-flex flex-column align-items-center">
      <div id="restaurants-go-here" class="w-100"></div>
    </main>

    <!-- FOOTER -->
    <nav class="navbar fixed-bottom custom-footer">
      <div class="container-fluid d-flex justify-content-around text-center">
        <a href="#" class="nav-link">
          <img src="/images/map.png" alt="Add" class="nav-icon" />
        </a>
        <a href="/restaurant_list/landing.html" class="nav-link active">
          <img src="/images/home.png" alt="Home" class="home-icon" />
        </a>
        <a href="/user-profile.html" class="nav-link">
          <img src="/images/user.png" alt="Profile" class="profile-icon" />
        </a>
      </div>
    </nav>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./landing.js"></script>
    <script>
      const searchToggleBtn = document.getElementById("searchToggleBtn");
      const navbarSearch = document.getElementById("navbarSearch");
      if (searchToggleBtn && navbarSearch && window.bootstrap) {
        const searchCollapse = bootstrap.Collapse.getOrCreateInstance(
          navbarSearch,
          { toggle: false },
        );
        searchToggleBtn.addEventListener("click", (e) => {
          e.preventDefault();
          searchCollapse.toggle();
        });
      }
    </script>
    <script type="module" src="../src/search.js"></script>
  </body>
</html>
