<!doctype html>
<html lang="en">
  <head>
    <title>FastPass Restaurant</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles/style.css" />
  </head>

  <body class="restaurant-page">
    <!-- NAVBAR -->
    <nav class="navbar navbar-light topbar-custom">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <a class="navbar-brand mx-auto mb-0 topbar-brand" href="./landing.html">
          <img
            src="../images/logoNoBG.png"
            alt="FastPass"
            class="topbar-logo"
          />
        </a>
      </div>
    </nav>

    <!-- RESTAURANT DETAILS -->
    <main class="container my-5 d-flex flex-column align-items-center">
      <div class="card mb-4 shadow" style="max-width: 480px; width: 100%">
        <!-- IMAGE -->
        <img
          id="restaurantImage"
          class="card-img-top"
          src="./images/default.png"
          alt="Restaurant Image"
        />

        <div class="card-body text-center">
          <!-- NAME -->
          <h2 id="restaurantName" class="card-title">Loading...</h2>

          <!-- DESCRIPTION -->
          <p id="restaurantDescription" class="card-text"></p>

          <!-- WAIT TIME -->
          <span id="restaurantWait" class="badge mb-2"></span>

          <!-- STARS -->
          <div id="restaurantRating" class="text-center fs-5 mt-3">
            <p>Rate this restaurant:</p>
            <span class="material-icons star">star_outline</span>
            <span class="material-icons star">star_outline</span>
            <span class="material-icons star">star_outline</span>
            <span class="material-icons star">star_outline</span>
            <span class="material-icons star">star_outline</span>
          </div>

          <!-- WRITE REVIEW BUTTON -->
          <div class="mt-3">
            <button id="writeReviewBtn" class="btn btn-primary">
              Write Review
            </button>
          </div>
        </div>
      </div>

      <!-- REVIEWS CONTAINER (future) -->
      <div id="reviewsContainer" class="w-100" style="max-width: 480px">
        <!-- Reviews will appear here -->
      </div>
    </main>

    <!-- FOOTER -->
    <nav class="navbar fixed-bottom custom-footer">
      <div class="container-fluid d-flex justify-content-around text-center">
        <a href="/add_restaurant/add.html" class="nav-link">
          <img src="/images/add.png" alt="Add" class="nav-icon" />
        </a>
        <a href="./landing.html" class="nav-link">
          <img src="/images/home.png" alt="Home" class="home-icon" />
        </a>
        <a href="/user-profile.html" class="nav-link">
          <img src="/images/user.png" alt="Profile" class="profile-icon" />
        </a>
      </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Your JS -->
    <script type="module" src="./eachRestaurant.js"></script>
  </body>
</html>
