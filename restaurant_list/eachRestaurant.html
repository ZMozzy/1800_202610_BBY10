<!doctype html>
<html lang="en">
  <head>
    <title>FastPass Restaurant</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles/style.css" />
  </head>

  <body class="restaurant-page">
    <!-- NAVBAR -->
    <nav class="navbar navbar-light topbar-custom">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <a class="navbar-brand mx-auto mb-0 topbar-brand" href="./landing.html">
          <img
            src="../images/logoNoBG.png"
            alt="FastPass"
            class="topbar-logo"
          />
        </a>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container my-5" style="max-width: 600px">
      <!-- MAIN IMAGE -->
      <img
        id="restaurantImage"
        class="img-fluid rounded mb-3"
        src="./images/default.png"
        alt="Restaurant Image"
      />

      <!-- BASIC INFO -->
      <div class="text-center mb-4">
        <h2 id="restaurantName">Loading...</h2>
        <p id="restaurantDescription"></p>
        <span id="restaurantWait" class="badge mb-2"></span>
      </div>

      <!-- PHOTO GALLERY -->
      <h5>Photos</h5>
      <div
        id="photoGallery"
        class="d-flex gap-2 flex-wrap mb-4 justify-content-center"
      ></div>

      <!-- MENU SECTION -->
      <h5>Menu</h5>
      <div
        id="menuGallery"
        class="d-flex gap-2 flex-wrap mb-4 justify-content-center"
      ></div>

      <!-- BUSINESS LICENSE -->
      <h5>Business License</h5>
      <div
        id="licenseGallery"
        class="d-flex gap-2 flex-wrap mb-4 justify-content-center"
      ></div>

      <!-- RATINGS -->
      <div id="restaurantRating" class="text-center fs-5 mt-3">
        <p>Rate this restaurant:</p>
        <span class="material-icons star">star_outline</span>
        <span class="material-icons star">star_outline</span>
        <span class="material-icons star">star_outline</span>
        <span class="material-icons star">star_outline</span>
        <span class="material-icons star">star_outline</span>
      </div>

      <!-- WRITE REVIEW BUTTON -->
      <div class="text-center mt-3">
        <button id="writeReviewBtn" class="btn btn-primary">
          Write Review
        </button>
      </div>

      <!-- REVIEWS -->
      <div id="reviewsContainer" class="mt-4"></div>
    </main>

    <!-- FOOTER -->
    <nav class="navbar fixed-bottom custom-footer">
      <div class="container-fluid d-flex justify-content-around text-center">
        <a href="/add_restaurant/add.html" class="nav-link">
          <img src="/images/add.png" alt="Add" class="nav-icon" />
        </a>
        <a href="./landing.html" class="nav-link">
          <img src="/images/home.png" alt="Home" class="home-icon" />
        </a>
        <a href="/user-profile.html" class="nav-link">
          <img src="/images/user.png" alt="Profile" class="profile-icon" />
        </a>
      </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script type="module" src="./eachRestaurant.js"></script>
        <script type=" module" src="../src/search.js"></script>

  </body>
</html>
