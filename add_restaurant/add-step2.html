<!doctype html>
<html lang="en">
  <head>
    <!-- Page title shown in the browser tab -->
    <title>My BCIT Project</title>

    <!-- Project template metadata -->
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Character encoding -->
    <meta charset="utf-8" />

    <!-- Responsive layout for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap stylesheet -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom project stylesheet -->
    <link rel="stylesheet" href="../styles/style.css" />
  </head>

  <body class="add-flow-page">
    <!-- Top navigation bar -->
    <nav class="navbar navbar-light topbar-custom">
      <div class="container-fluid justify-content-center">
        <!-- Brand link that returns to the home page -->
        <a class="navbar-brand mb-0 topbar-brand" href="../index.html">
          <img src="../images/logoNoBG.png" alt="FastPass" class="topbar-logo" />
          <small class="topbar-subtitle">Business</small>
        </a>
      </div>
    </nav>

    <!-- Main page content -->
    <main class="container">
      <!-- Step 2 card container -->
      <section class="add-flow-card">
        <!-- Header area: back button, step label, and next button -->
        <div class="add-flow-head">
          <a href="./add.html" class="btn review-btn-secondary review-btn-small"
            >Back</a
          >
          <p class="step-label">Step 2/3</p>

          <!-- Moves to Step 3 -->
          <a
            href="./add-step3.html"
            id="step2NextBtn"
            class="btn review-btn-primary review-btn-small"
          >
            Next
          </a>
        </div>

        <!-- Validation message -->
        <p
          id="step2ErrorMsg"
          class="text-danger small mb-2"
          style="display: none"
        >
          Please fill out all required (*) fields before continuing.
        </p>

        <!-- Service days and business hours -->
        <div class="mb-3">
          <label class="form-label">Hours & Services*</label>
          <div class="add-row">
            <select id="startDaySelect" class="form-select add-select" required>
              <option value="" selected disabled>Select start day</option>
              <option value="Mon">Mon</option>
              <option value="Tue">Tue</option>
              <option value="Wed">Wed</option>
              <option value="Thu">Thu</option>
              <option value="Fri">Fri</option>
              <option value="Sat">Sat</option>
              <option value="Sun">Sun</option>
            </select>

            <select id="endDaySelect" class="form-select add-select" required>
              <option value="" selected disabled>Select end day</option>
              <option value="Mon">Mon</option>
              <option value="Tue">Tue</option>
              <option value="Wed">Wed</option>
              <option value="Thu">Thu</option>
              <option value="Fri">Fri</option>
              <option value="Sat">Sat</option>
              <option value="Sun">Sun</option>
            </select>
          </div>
        </div>

        <!-- Opening and closing time -->
        <div class="mb-3 add-row">
          <input
            type="time"
            id="openTimeInput"
            class="form-control add-input"
            required
            value="10:00"
          />
          <input
            type="time"
            id="closeTimeInput"
            class="form-control add-input"
            required
            value="21:00"
          />
        </div>

        <!-- Holiday hours -->
        <div class="mb-3">
          <label class="form-label">Holiday Hours (Optional)</label>
          <div class="add-row mb-2">
            <input
              type="time"
              id="holidayOpenTimeInput"
              class="form-control add-input"
              value="10:00"
            />
            <input
              type="time"
              id="holidayCloseTimeInput"
              class="form-control add-input"
              value="21:00"
            />
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              id="holidayClosedCheckbox"
            />
            <label class="form-check-label" for="holidayClosedCheckbox"
              >Holiday Closed</label
            >
          </div>
        </div>

        <!-- Photos and price range -->
        <div class="mb-3 add-row">
          <div>
            <label class="form-label">Photos*</label>
            <input
              type="file"
              id="photoInput"
              class="form-control add-input"
              accept="image/*"
              multiple
              required
            />

            <!-- Preview area for selected photos -->
            <div id="photoPreviewWrapper" class="mt-2" style="display: none">
              <div id="photoPreviewList" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>

          <div>
            <label class="form-label">Price Range*</label>
            <select
              id="priceRangeSelect"
              class="form-select add-select"
              required
            >
              <option value="" selected disabled>Select price</option>
              <option value="$">$</option>
              <option value="$$">$$</option>
              <option value="$$$">$$$</option>
            </select>
          </div>
        </div>

        <!-- Menu upload -->
        <div class="mb-2 add-row">
          <div>
            <label class="form-label">Add Menu*</label>
            <input
              type="file"
              id="menuInput"
              class="form-control add-input"
              accept="image/*"
              multiple
              required
            />

            <!-- Preview area for selected menu files -->
            <div id="menuPreviewWrapper" class="mt-2" style="display: none">
              <div id="menuPreviewList" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Step 2 page script -->
    <script src="../src/add-step2.js"></script>
    
    <script src="/src/footer.js"></script>
  
  </body>
</html>
