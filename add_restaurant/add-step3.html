<!doctype html>
<html lang="en">
  <head>
    <!-- Page title shown in the browser tab -->
    <title>My BCIT Project</title>

    <!-- Project template metadata -->
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Character encoding -->
    <meta charset="utf-8" />

    <!-- Responsive layout for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap stylesheet -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom project stylesheet -->
    <link rel="stylesheet" href="../styles/style.css" />
  </head>

  <body class="add-flow-page">
    <!-- Top navigation bar -->
    <nav class="navbar navbar-light topbar-custom">
      <div class="container-fluid justify-content-center">
        <!-- Brand link that returns to the home page -->
        <a class="navbar-brand mb-0 topbar-brand" href="../index.html">
          <img src="../images/logoNoBG.png" alt="FastPass" class="topbar-logo" />
          <small class="topbar-subtitle">Business</small>
        </a>
      </div>
    </nav>

    <!-- Main page content -->
    <main class="container">
      <!-- Step 3 card container -->
      <section class="add-flow-card">
        <!-- Header area: back button and step label -->
        <div class="add-flow-head">
          <a
            href="./add-step2.html"
            class="btn review-btn-secondary review-btn-small"
            >Back</a
          >
          <p class="step-label">Step 3/3</p>
          <span></span>
        </div>

        <!-- Validation message, hidden by default -->
        <p
          id="step3ErrorMsg"
          class="text-danger small mb-2"
          style="display: none"
        >
          Please fill out all required fields before submitting.
        </p>

        <!-- Password requirements helper text -->
        <p class="small text-muted mb-3">
          Password must be at least 8 characters and include uppercase,
          lowercase, number, and special character.
        </p>

        <!-- Email, required -->
        <div class="mb-3">
          <label class="form-label">E-mail*</label>
          <input
            type="email"
            id="emailInput"
            class="form-control add-input"
            required
          />
        </div>

        <!-- Password, required -->
        <div class="mb-3">
          <label class="form-label">Password*</label>
          <input
            type="password"
            id="passwordInput"
            class="form-control add-input"
            required
          />
        </div>

        <!-- Confirm password, required -->
        <div class="mb-3">
          <label class="form-label">Confirm Password*</label>
          <input
            type="password"
            id="confirmPasswordInput"
            class="form-control add-input"
            required
          />
        </div>

        <!-- Phone number, required -->
        <div class="mb-3">
          <label class="form-label">Phone*</label>
          <input
            type="tel"
            id="phoneInput"
            class="form-control add-input"
            required
          />
        </div>

        <!-- Business license file, required -->
        <div class="mb-4">
          <label class="form-label">Business License*</label>
          <input
            type="file"
            id="businessLicenseInput"
            class="form-control add-input"
            accept="image/*"
            multiple
            required
          />

          <div
            id="businessLicensePreviewWrapper"
            class="mt-2"
            style="display: none"
          >
            <div
              id="businessLicensePreviewList"
              class="d-flex flex-wrap gap-2"
            ></div>
          </div>
        </div>

        <!-- Button to open the review page -->
        <div class="text-center">
          <a
            href="./add-review.html"
            id="submitBtn"
            class="btn review-btn-primary review-btn-large"
          >
            Review
          </a>
        </div>
      </section>
    </main>

    <!-- Bottom navigation bar -->
    <div id="footer"></div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../src/add-step3.js"></script>
  
    <script src="/footer.js"></script>
  </body>
</html>
