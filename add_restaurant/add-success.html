<!doctype html>
<html lang="en">
  <head>
    <!-- Browser tab title -->
    <title>My BCIT Project</title>
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />

    <!-- Project template information -->
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Page character encoding -->
    <meta charset="utf-8" />

    <!-- Mobile responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap stylesheet -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Project custom stylesheet -->
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body class="add-flow-page">
    <!-- Top navigation bar -->
    <nav class="navbar navbar-light topbar-custom">
      <div class="container-fluid justify-content-center">
        <!-- Brand name, click to return to home -->
        <a class="navbar-brand mb-0 topbar-brand" href="./index.html">
          <img src="../images/logoNoBG.png" alt="FastPass" class="topbar-logo" />
          <small class="topbar-subtitle">Business</small>
        </a>
      </div>
    </nav>

    <!-- Main content area -->
    <main class="container">
      <!-- Success result card -->
      <section class="success-wrap">
        <!-- Dynamically display the restaurant name just submitted -->
        <h3 class="mb-3" id="successRestaurantName">(Restaurant Name)</h3>

        <!-- Success status icon -->
        <div class="success-check">✓</div>

        <!-- Success submission notification text -->
        <h4 class="mb-4">Submitted Successfully!</h4>

        <!-- Return to home -->
        <a
          href="/restaurant_list/landing.html"
          class="btn review-btn-primary review-btn-large"
          >Home</a
        >
      </section>
    </main>

    <!-- Bottom navigation bar -->
    <div id="footer"></div>

    <!-- Bootstrap interactive script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Get the element for displaying restaurant name on success page
      const successRestaurantName = document.getElementById(
        "successRestaurantName",
      );

      // Read the restaurant name saved by previous page from localStorage
      const storedRestaurantName = localStorage.getItem("restaurantName");

      // If there is a saved name, display it; otherwise use the default text
      if (storedRestaurantName && storedRestaurantName.trim() !== "") {
        successRestaurantName.textContent = storedRestaurantName;
      } else {
        successRestaurantName.textContent = "Restaurant";
      }
    </script>

    <!-- Shared main script -->
    <script type="module" src="../src/main.js"></script>

    <!-- Script to navigate to profile page -->
    <script type="module" src="../src/goToProfile.js"></script>
  
    <script type="module" src="/src/footer.js"></script>
  
  </body>
</html>
